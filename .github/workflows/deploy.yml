name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Add permissions for OIDC token
    permissions:
      id-token: write
      contents: read
    
    # Only run deployment after CI passes
    needs: []
    
    # Add environment protection for production deployments
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Deploy to AWS
      run: npm run deploy
      
    - name: Deployment success notification
      if: success()
      run: echo "✅ Deployment to production completed successfully!"
      
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Deployment to production failed!"
